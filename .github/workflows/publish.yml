name: Publish legal docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/legal/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert Markdown to HTML
        run: |
          sudo apt-get install -y pandoc
          mkdir -p _site/technician
          pandoc docs/legal/privacy-policy-technician.md \
            --standalone \
            --metadata title="HomeHeroo Technician — Privacy Policy" \
            --css "https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" \
            -o _site/technician/index.html

          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=technician/">
          <title>HomeHeroo Legal</title></head>
          <body><a href="technician/">Privacy Policy — HomeHeroo Technician</a></body></html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
